services:
  ai-gateway:
    image: ${AI_GATEWAY_IMAGE:?AI_GATEWAY_IMAGE is required}
    container_name: ses-flow-ai-gateway
    restart: unless-stopped
    environment:
      AI_GATEWAY_HOST: 0.0.0.0
      AI_GATEWAY_PORT: 6307
      AI_GATEWAY_RUNNER_BASE_URL: http://backend:6302/runner-api
      CLAUDE_CODE_EXECUTABLE: ${CLAUDE_CODE_EXECUTABLE:-}
    ports:
      - "${AI_GATEWAY_PORT:-6307}:6307"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:6307/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
  backend:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE is required}
    container_name: ses-flow-backend
    restart: unless-stopped
    depends_on:
      ai-gateway:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      BACKEND_LOG: ${BACKEND_LOG:-info}
      BACKEND_STATIC_DIR: /app/views
      AI_GATEWAY_PROXY_TARGET: http://ai-gateway:6307
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${BACKEND_PORT:-6302}:6302"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "Promise.all([fetch('http://127.0.0.1:6302/runner-api/health'), fetch('http://127.0.0.1:6302/views/')]).then(([api, web]) => process.exit(api.ok && web.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
