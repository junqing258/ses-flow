tasks:
  dev:
    command: 'pnpm run dev'
    preset: 'server'
    inputs:
      - 'package.json'
      - 'src/**/*'
      - 'tests/**/*'
      - 'vite.config.*'
      - 'vitest.config.*'
      - 'tsconfig*.json'

  build:
    command: 'pnpm run build'
    inputs:
      - 'package.json'
      - 'src/**/*'
      - 'vite.config.*'
      - 'tsconfig*.json'
    outputs:
      - 'dist'

  start:
    command: 'pnpm run preview'
    deps:
      - '~:build'
    preset: 'server'
    inputs:
      - 'dist/**/*'
      - 'package.json'

  test:
    command: 'pnpm run test'
    inputs:
      - 'package.json'
      - 'src/**/*'
      - 'tests/**/*'
      - 'vitest.config.*'
      - 'tsconfig*.json'

  lint:
    command: 'pnpm run lint'
    inputs:
      - 'package.json'
      - 'src/**/*'
      - 'tests/**/*'
      - '.eslintrc*'
      - 'eslint.config.*'
      - 'tsconfig*.json'

  format:
    command: 'pnpm run format'
    inputs:
      - 'package.json'
      - 'src/**/*'
      - 'tests/**/*'
      - '*.json'
      - '*.js'
      - '*.ts'
      - '*.vue'

  formatCheck:
    command: 'pnpm run format:check'
    inputs:
      - 'package.json'
      - 'src/**/*'
      - 'tests/**/*'
      - '*.json'
      - '*.js'
      - '*.ts'
      - '*.vue'
