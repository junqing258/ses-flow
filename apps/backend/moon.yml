tasks:
  dev:
    command: 'pnpm run dev'
    preset: 'server'
    inputs:
      - 'package.json'
      - 'tsconfig*.json'
      - 'src/**/*'
      - 'prisma/**/*'
      - 'test/**/*'

  build:
    command: 'pnpm run build'
    inputs:
      - 'package.json'
      - 'tsconfig*.json'
      - 'src/**/*'
      - 'prisma/**/*'
    outputs:
      - 'dist'

  start:
    command: 'pnpm run start'
    deps:
      - '~:build'
    preset: 'server'
    inputs:
      - 'dist/**/*'
      - 'package.json'

  test:
    command: 'pnpm run test'
    inputs:
      - 'package.json'
      - 'tsconfig*.json'
      - 'src/**/*'
      - 'test/**/*'
      - 'prisma/**/*'
